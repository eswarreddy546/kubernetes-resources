# ---------------------------
# 🔹 Persistent Volume (PV)
# ---------------------------
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static-pv   # PV name (cluster-level resource, no namespace)
  labels:
    project: frontend   # label (correct way, not "project:" directly)
spec:
  capacity:
    storage: 15Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce     # EBS supports only RWO
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  awsElasticBlockStore:
    volumeID: vol-0032626534bc9574c   # your EBS volume (must be same AZ)
    fsType: ext4

---

# ---------------------------
# 🔹 Persistent Volume Claim (PVC)
# ---------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: roboshop
  name: ebs-static-pv   # keeping same name as you requested
  labels:
    project: frontend
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual   # must match PV
  resources:
    requests:
      storage: 15Gi          # must match PV size

---

# ---------------------------
# 🔹 Pod (Mount PVC)
# ---------------------------
apiVersion: v1
kind: Pod
metadata:
  namespace: roboshop
  name: ebs-pod
  labels:
    project: frontend        # required for Service selector
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1b   # ensures same AZ as EBS

  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - mountPath: /usr/share/nginx/html   # path inside container
          name: ebs-volume

  volumes:
    - name: ebs-volume
      persistentVolumeClaim:
        claimName: ebs-static-pv   # PVC name

---

# ---------------------------
# 🔹 Service (LoadBalancer)
# ---------------------------
apiVersion: v1
kind: Service
metadata:
  name: ebs-static-pv
  namespace: roboshop
spec:
  type: LoadBalancer
  selector:
    project: frontend   # matches pod label
  ports:
    - port: 80
      targetPort: 80