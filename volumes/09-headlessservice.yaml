apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: roboshop
  labels:
    app: nginx
spec:
  containers:
    - name: nginx
      image: nginx
      ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  namespace: roboshop
spec:
  clusterIP: None   # 👈 THIS MAKES IT HEADLESS
  selector:
    app: nginx      # 👈 matches pod label
  ports:
    - port: 80
      targetPort: 80