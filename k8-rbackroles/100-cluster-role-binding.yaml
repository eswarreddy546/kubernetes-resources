apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: readonly-cluster-binding

subjects:
- kind: Group
  name: readonly-group   # 👈 same as aws-auth
  apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: ClusterRole
  name: readonly-cluster-role
  apiGroup: rbac.authorization.k8s.io