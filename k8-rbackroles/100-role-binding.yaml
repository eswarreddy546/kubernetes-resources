apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods-binding
  namespace: roboshop

subjects:
- kind: User
  name: todayuser          # user name
  apiGroup: rbac.authorization.k8s.io

roleRef:
  kind: Role
  name: pod-reader        # role name (match avvali)
  apiGroup: rbac.authorization.k8s.io