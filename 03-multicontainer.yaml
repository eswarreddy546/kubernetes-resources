apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
  namespace: roboshop
  labels:
    environment: prod
    project: roboshop

spec:
  containers:
  - name: nginx
    image: nginx
    ports:
    - containerPort: 443

  - name: almalinux
    image: almalinux
    ports:
    - containerPort: 443